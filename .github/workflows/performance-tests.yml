name: performance-tests

on:
  workflow_dispatch:        # manual trigger
  schedule:
    - cron: '0 6 * * 1'    # every Monday at 06:00 UTC

jobs:
  performance-test:
    runs-on: ubuntu-latest
    env:
      API_KEY: ${{ secrets.API_KEY }}

    steps:
      - name: "Checkout branch"
        uses: actions/checkout@v5

      - name: "Install JMeter"
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q default-jre
          wget -q https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-5.6.3.tgz
          tar -xzf apache-jmeter-5.6.3.tgz
          echo "$GITHUB_WORKSPACE/apache-jmeter-5.6.3/bin" >> $GITHUB_PATH

      - name: "Run JMeter performance tests"
        run: |
          mkdir -p jmeter/results
          jmeter -n \
            -t jmeter/performance-tests.jmx \
            -l jmeter/results/results.jtl \
            -e -o jmeter/results/report \
            -Japi_key=${{ secrets.API_KEY }}

      - name: "Upload JTL results"
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: jmeter-jtl
          path: jmeter/results/results.jtl

      - name: "Upload HTML report"
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: jmeter-html-report
          path: jmeter/results/report/

  performance-report:
    runs-on: ubuntu-latest
    needs: performance-test
    if: always()

    steps:
      - name: "Download JTL results"
        uses: actions/download-artifact@v7
        with:
          name: jmeter-jtl

      - name: "Generate performance summary"
        run: |
          echo "## ⚡ Performance Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -f "results.jtl" ]; then
            # Skip header line, count totals from JTL CSV
            total=$(tail -n +2 results.jtl | wc -l | tr -d ' ')
            errors=$(tail -n +2 results.jtl | awk -F',' '$8 == "false"' | wc -l | tr -d ' ')
            passed=$((total - errors))

            # Response times (elapsed is column 2)
            avg=$(tail -n +2 results.jtl | awk -F',' '{sum+=$2; count++} END {printf "%.0f", sum/count}')
            min=$(tail -n +2 results.jtl | awk -F',' 'NR==1{min=$2} $2<min{min=$2} END {print min}')
            max=$(tail -n +2 results.jtl | awk -F',' 'BEGIN{max=0} $2>max{max=$2} END {print max}')

            # Error rate
            if [ "$total" -gt 0 ]; then
              error_rate=$(awk "BEGIN {printf \"%.1f\", ($errors/$total)*100}")
            else
              error_rate="0.0"
            fi

            echo "### Summary" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| Total Requests | $total |" >> $GITHUB_STEP_SUMMARY
            echo "| ✅ Passed | $passed |" >> $GITHUB_STEP_SUMMARY
            echo "| ❌ Failed | $errors |" >> $GITHUB_STEP_SUMMARY
            echo "| Error Rate | $error_rate% |" >> $GITHUB_STEP_SUMMARY
            echo "| Avg Response Time | ${avg}ms |" >> $GITHUB_STEP_SUMMARY
            echo "| Min Response Time | ${min}ms |" >> $GITHUB_STEP_SUMMARY
            echo "| Max Response Time | ${max}ms |" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY

            # Threshold check: fail summary if error rate > 0% or avg > 2000ms
            if [ "$errors" -gt 0 ]; then
              echo "⚠️ **Some requests failed. Check the HTML report artifact for details.**" >> $GITHUB_STEP_SUMMARY
            elif [ "$avg" -gt 2000 ]; then
              echo "⚠️ **Average response time exceeded 2000ms threshold.**" >> $GITHUB_STEP_SUMMARY
            else
              echo "🎉 **All requests passed within acceptable response times.**" >> $GITHUB_STEP_SUMMARY
            fi

          else
            echo "❌ **JTL results file not found.**" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "*Full HTML report available in the \`jmeter-html-report\` artifact*" >> $GITHUB_STEP_SUMMARY
